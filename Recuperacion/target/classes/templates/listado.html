<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tienda Online</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Listado de Artículos</h2>
<table class="table">
    <thead>
    <tr>
        <th>Título</th>
        <th>Precio</th>
        <th>Categoría</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
        <td th:text="${item.title}"></td>
        <td th:text="${item.price} + '€'"></td>
        <td th:text="${item.category}"></td>
        <td><a th:href="@{'/items/editar/'+${item._id}}" class="btn btn-primary btn-sm">Editar</a></td>
        <td><a th:href="@{'/items/detalle/'+${item._id}}" class="btn btn-primary btn-sm">Detalles</a></td>
    </tr>
    </tbody>
</table>
<a href="/items/stats" class="btn btn-info">Ver Estadísticas</a>
</body>
</html>
