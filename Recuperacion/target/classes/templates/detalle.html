<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle del Producto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card">
    <div class="card-header">
        <h2 th:text="${item.title}">Título</h2>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-4">
                <img th:src="${item.image}" class="img-fluid" alt="Imagen del producto">
            </div>
            <div class="col-md-8">
                <p><strong>ID Interno:</strong> <span th:text="${item.id}"></span></p>
                <p><strong>EAN:</strong> <span th:text="${item.EAN}"></span></p>
                <p><strong>Precio:</strong> <span th:text="${item.price} + '€'"></span></p>
                <p><strong>Categoría:</strong> <span th:text="${item.category}"></span></p>
                <p><strong>Fabricante:</strong> <span th:text="${item.manufacturer}"></span></p>
                <p><strong>Valoración:</strong> <span th:text="${item.rate} + '/10'"></span></p>
                <p><strong>Stock actual:</strong> <span th:text="${item.count}"></span></p>
                <div class="mt-3">
                    <strong>Descripción:</strong>
                    <div th:utext="${item.description}"></div> </div>
            </div>
            </tr>
        </div>
        <div class="card-footer">
            <a href="/items" class="btn btn-secondary">Volver al listado</a>
        </div>
    </div>
</div>
</body>
</html>
