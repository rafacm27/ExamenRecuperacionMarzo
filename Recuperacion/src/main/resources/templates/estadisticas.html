<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Panel de Control</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h1>Panel de Estadísticas</h1>
<hr>
<div class="row text-center mb-4">
    <div class="col-md-4">
        <div class="card bg-primary text-white p-3">
            <h3>Total Ítems</h3>
            <h2 th:text="${total}">0</h2>
        </div>
    </div>
</div>

<h3>Productos con Stock Bajo (< 100)</h3>
<ul class="list-group mb-4">
    <li th:each="i : ${lowStock}" class="list-group-item d-flex justify-content-between align-items-center">
        <span th:text="${i.title}"></span>
        <span class="badge bg-danger rounded-pill" th:text="${i.count}"></span>
    </li>
</ul>

<h3>Listado de Fabricantes</h3>
<div class="d-flex flex-wrap gap-2">
    <span th:each="m : ${manufacturers}" class="badge bg-secondary p-2" th:text="${m}"></span>
</div>

<div class="mt-5">
    <a href="/items" class="btn btn-dark">Regresar</a>
</div>
</body>
</html>
