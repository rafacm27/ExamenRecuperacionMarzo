<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Producto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Editar Artículo</h2>
<form th:action="@{/items/update}" th:object="${item}" method="post" class="card p-4">
    <input type="hidden" th:field="*{_id}">  <div class="mb-3">
    <label>Título:</label>
    <input type="text" th:field="*{title}" class="form-control">
</div>
    <div class="row">
        <div class="col">
            <label>Precio:</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control">
        </div>
        <div class="col">
            <label>Stock (Count):</label>
            <input type="number" th:field="*{count}" class="form-control">
        </div>
    </div>
    <div class="mb-3 mt-3">
        <label>Categoría:</label>
        <select th:field="*{category}" class="form-select">
            <option value="Electrónica">Electrónica</option>
            <option value="Accesorios">Accesorios</option>
            <option value="Hogar">Hogar</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Descripción (HTML permitido):</label>
        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
    </div>

    <div class="mt-3">
        <button type="submit" class="btn btn-success">Guardar Cambios</button>
        <a href="/items" class="btn btn-danger">Cancelar</a>
    </div>
</form>
</body>
</html>
